{{- if .IsHome -}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "WebSite",
      "@id": "{{ .Site.BaseURL }}#website",
      "url": "{{ .Site.BaseURL }}",
      "name": "{{ .Site.Title }}",
      "description": "{{ .Site.Params.description }}"
    },
    {
      "@type": "LocalBusiness",
      "@id": "{{ .Site.BaseURL }}#organization",
      "name": "Arts-Link",
      "url": "{{ .Site.BaseURL }}",
      "description": "{{ .Site.Params.description }}",
      "founder": {
        "@type": "Person",
        "name": "Ben Strawbridge",
        "email": "{{ .Site.Params.author.email }}"
      },
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Los Angeles",
        "addressRegion": "CA",
        "addressCountry": "US"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "{{ .Site.Params.author.email }}",
        "contactType": "customer service"
      },
      "logo": {
        "@type": "ImageObject",
        "url": "{{ "images/logo/arts-link-colors.webp" | absURL }}"
      }
    }
  ]
}
</script>
{{- else if .IsPage -}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "{{ .Site.BaseURL }}"
    },
    {
      "@type": "ListItem",
      "position": 2,
      "name": "{{ .Title }}"
    }
  ]
}
</script>
{{- end -}}
