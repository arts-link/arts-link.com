{{/*
  Inline theme-init script – must run synchronously (no defer/async) so the
  correct theme class is applied to <html> before any CSS is painted, which
  prevents a flash of the wrong theme on page load.
*/}}
<script>
  (function () {
    var t = localStorage.theme;
    if (t === 'dark') {
      document.documentElement.classList.add('dark');
    } else if (t === 'artistic') {
      document.documentElement.classList.add('artistic');
    } else if (!t) {
      if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.classList.add('dark');
      }
    }
    // 'light' is the default – no class needed
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<!-- async CSS (optionally increase loading priority with fetchpriority="high") -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700&display=swap" media="print" onload="this.onload=null;this.removeAttribute('media');" fetchpriority="high">
<!-- no-JS fallback -->
<noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700&display=swap">
</noscript>
<style>
    @font-face {
        font-family: 'Chalkduster';
        src: url('/fonts/Chalkduster.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
    }
</style>
