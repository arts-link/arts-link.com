<footer class="border-t border-cream/10 mt-32">
  <div class="max-w-6xl mx-auto px-6 py-20">
    <div class="flex flex-col md:flex-row justify-between items-start gap-16">

      <!-- Brand -->
      <div class="max-w-xs">
        <p class="font-display italic text-2xl text-cream mb-4">arts-link</p>
        <p class="text-cream/40 text-sm leading-relaxed">
          Bespoke websites for artists and bands. Fast, personal, and yours to keep.
        </p>
      </div>

      <!-- Links -->
      <div class="flex flex-col gap-3">
        <p class="text-cream/25 text-xs uppercase tracking-widest mb-2">Navigate</p>
        <a href="/work/" class="text-cream/50 hover:text-cream text-sm transition-colors">Work</a>
        <a href="/services/" class="text-cream/50 hover:text-cream text-sm transition-colors">Services</a>
        <a href="/contact/" class="text-cream/50 hover:text-cream text-sm transition-colors">Contact</a>
        <a href="https://domains.arts-link.com" target="_blank" rel="noopener noreferrer" class="text-cream/50 hover:text-cream text-sm transition-colors">Domain Names ↗</a>
      </div>

      <!-- Final CTA -->
      <div>
        <p class="text-cream/25 text-xs uppercase tracking-widest mb-6">Ready to start?</p>
        <a href="/contact/" data-track-event="CTA Click" data-track-props='{"location":"footer"}' class="inline-block text-cream text-sm tracking-widest uppercase px-7 py-3 border border-ember hover:bg-ember transition-colors duration-200">
          Get in touch →
        </a>
      </div>

    </div>

    <div
      class="mt-20 pt-8 border-t border-cream/5 flex flex-col md:flex-row justify-between items-center gap-4"
      x-data="{
        isDark: !document.documentElement.classList.contains('light'),
        toggleTheme() {
          document.documentElement.classList.add('theme-transitioning');
          this.isDark = !this.isDark;
          document.documentElement.classList.toggle('light', !this.isDark);
          localStorage.setItem('theme', this.isDark ? 'dark' : 'light');
          setTimeout(() => document.documentElement.classList.remove('theme-transitioning'), 400);
        }
      }"
    >
      <p class="text-cream/25 text-xs">© {{ now.Year }} arts-link.com · Ben Strawbridge · Los Angeles, CA</p>

      <!-- Theme toggle -->
      <button
        @click="toggleTheme()"
        :aria-label="isDark ? 'Switch to light mode' : 'Switch to dark mode'"
        role="switch"
        :aria-checked="!isDark"
        class="relative flex items-center w-12 h-6 rounded-full border border-cream/20 bg-ink-light cursor-pointer focus:outline-none focus-visible:ring-1 focus-visible:ring-ember"
        title="Toggle light / dark mode"
      >
        <!-- Sun icon (left = light side) -->
        <svg
          class="absolute left-1 w-3 h-3 transition-all duration-300 pointer-events-none"
          :class="isDark ? 'opacity-25 text-cream' : 'opacity-100 text-ember'"
          viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"
        >
          <path d="M12 2.25a.75.75 0 01.75.75v2.25a.75.75 0 01-1.5 0V3a.75.75 0 01.75-.75zM7.5 12a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM18.894 6.166a.75.75 0 00-1.06-1.06l-1.591 1.59a.75.75 0 101.06 1.061l1.591-1.59zM21.75 12a.75.75 0 01-.75.75h-2.25a.75.75 0 010-1.5H21a.75.75 0 01.75.75zM17.834 18.894a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 10-1.061 1.06l1.59 1.591zM12 18a.75.75 0 01.75.75V21a.75.75 0 01-1.5 0v-2.25A.75.75 0 0112 18zM7.166 17.834a.75.75 0 00-1.06 1.06l1.59 1.591a.75.75 0 001.061-1.06l-1.59-1.591zM6 12a.75.75 0 01-.75.75H3a.75.75 0 010-1.5h2.25A.75.75 0 016 12zM6.166 6.166a.75.75 0 011.06-1.06l1.591 1.59a.75.75 0 01-1.06 1.061l-1.591-1.59z"/>
        </svg>
        <!-- Sliding indicator -->
        <span
          class="absolute left-0.5 w-5 h-5 rounded-full shadow-sm pointer-events-none"
          :style="'transform: translateX(' + (isDark ? '24px' : '0px') + '); transition: transform 0.3s cubic-bezier(0.16,1,0.3,1); background-color: ' + (isDark ? 'rgb(var(--color-cream))' : 'rgb(var(--color-ember))')"
        ></span>
        <!-- Moon icon (right = dark side) -->
        <svg
          class="absolute right-1 w-3 h-3 transition-all duration-300 pointer-events-none"
          :class="isDark ? 'opacity-100 text-cream' : 'opacity-25 text-cream'"
          viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"
        >
          <path fill-rule="evenodd" d="M9.528 1.718a.75.75 0 01.162.819A8.97 8.97 0 009 6a9 9 0 009 9 8.97 8.97 0 003.463-.69.75.75 0 01.981.98 10.503 10.503 0 01-9.694 6.46c-5.799 0-10.5-4.701-10.5-10.5 0-4.368 2.667-8.112 6.46-9.694a.75.75 0 01.818.162z" clip-rule="evenodd"/>
        </svg>
      </button>

      <a href="mailto:hello@arts-link.com" class="text-cream/25 hover:text-cream/50 text-xs transition-colors">hello@arts-link.com</a>
    </div>
  </div>
</footer>
