<header class="sticky top-0 z-50 bg-ink/95 backdrop-blur-sm border-b border-cream/5" x-data="{ open: false }">
  <div class="max-w-6xl mx-auto px-6">
    <nav class="flex items-center justify-between h-16">

      <!-- Logo -->
      <a href="/" class="font-display italic text-xl text-cream hover:text-ember transition-colors duration-200 tracking-tight">
        arts-link
      </a>

      <!-- Desktop nav -->
      <ul class="hidden md:flex items-center gap-6">
        <li>
          <a href="/work/" class="text-cream/60 hover:text-cream text-sm tracking-widest uppercase transition-colors duration-200">
            Work
          </a>
        </li>
        <li>
          <a href="/services/" class="text-cream/60 hover:text-cream text-sm tracking-widest uppercase transition-colors duration-200">
            Services
          </a>
        </li>
        <li>
          <!-- Theme switcher — cycles: dark → light → artistic → system -->
          <button id="themeBtn" aria-label="Switch theme" class="text-cream/50 hover:text-cream p-1 transition-colors duration-200">
            <!-- Sun = currently light mode -->
            <svg id="icon-light" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"/>
            </svg>
            <!-- Moon = currently dark mode -->
            <svg id="icon-dark" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z"/>
            </svg>
            <!-- Sparkles = currently artistic mode -->
            <svg id="icon-artistic" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09ZM18.259 8.715 18 9.75l-.259-1.035a3.375 3.375 0 0 0-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 0 0 2.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 0 0 2.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 0 0-2.456 2.456Z"/>
            </svg>
            <!-- Screen = currently system mode -->
            <svg id="icon-system" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 17.25v1.007a3 3 0 0 1-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0 1 15 18.257V17.25m6-12V15a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 15V5.25m18 0A2.25 2.25 0 0 0 18.75 3H5.25A2.25 2.25 0 0 0 3 5.25m18 0H3"/>
            </svg>
          </button>
        </li>
        <li>
          <a href="/contact/" class="text-cream text-sm tracking-widest uppercase px-5 py-2 border border-ember hover:bg-ember transition-colors duration-200">
            Let's talk
          </a>
        </li>
      </ul>

      <!-- Mobile hamburger -->
      <div class="md:hidden flex items-center gap-2">
        <!-- Theme toggle (mobile) -->
        <button id="themeBtnMobile" aria-label="Switch theme" class="text-cream/50 hover:text-cream p-2 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"/>
          </svg>
        </button>
        <button @click="open = !open" class="text-cream/60 hover:text-cream p-2 transition-colors" aria-label="Toggle navigation">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path x-show="!open" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16M4 18h16"/>
          <path x-show="open" x-cloak stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
      </div>

    </nav>
  </div>

  <!-- Mobile menu -->
  <div
    x-show="open"
    x-cloak
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 -translate-y-2"
    x-transition:enter-end="opacity-100 translate-y-0"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100 translate-y-0"
    x-transition:leave-end="opacity-0 -translate-y-2"
    class="md:hidden border-t border-cream/5 bg-ink"
  >
    <ul class="max-w-6xl mx-auto px-6 py-8 flex flex-col gap-6">
      <li>
        <a href="/work/" @click="open = false" class="text-cream/70 hover:text-cream text-xl tracking-wide transition-colors">Work</a>
      </li>
      <li>
        <a href="/services/" @click="open = false" class="text-cream/70 hover:text-cream text-xl tracking-wide transition-colors">Services</a>
      </li>
      <li>
        <a href="/contact/" @click="open = false" class="text-ember text-xl tracking-wide">Let's talk →</a>
      </li>
    </ul>
  </div>
</header>
