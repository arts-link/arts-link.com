<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
<head>
  <script>
    try {
      if (localStorage.getItem('theme') === 'light') {
        document.documentElement.classList.add('light');
      }
    } catch(e) {}
  </script>
  <meta charset="utf-8">
  <link rel="icon" href="/favicon.ico" sizes="32x32">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ with .Title }}{{ . }}{{ else }}{{ .Site.Title }}{{ end }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="canonical" href="{{ .Permalink }}">

  <!-- OG / social -->
  <meta property="og:site_name" content="{{ .Site.Title }}">
  <meta property="og:type" content="{{ if .IsHome }}website{{ else if .IsPage }}article{{ else }}website{{ end }}">
  <meta property="og:title" content="{{ if .IsHome }}{{ with .Title }}{{ . }}{{ else }}{{ .Site.Title }}{{ end }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:image" content="{{ .Site.BaseURL }}images/og-default.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ if .IsHome }}{{ with .Title }}{{ . }}{{ else }}{{ .Site.Title }}{{ end }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}">
  <meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta name="twitter:image" content="{{ .Site.BaseURL }}images/og-default.jpg">

  {{ partial "head/json-ld.html" . }}

  <!-- Fonts (self-hosted, preloaded — zero third-party, zero CLS) -->
  <link rel="preload" href="/fonts/fraunces-normal-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/fraunces-italic-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/dm-sans-latin.woff2" as="font" type="font/woff2" crossorigin>

  <!-- Styles (inlined — zero render-block, zero FOUC) -->
  {{- $css := resources.Get "css/main.css" | postCSS | minify }}
  <style>{{ $css.Content | safeCSS }}</style>

  <!-- Alpine.js -->
  <script defer src="/js/alpine.min.js"></script>

  <!-- Analytics -->
  <script defer src="/js/analytics.js"></script>
  {{ if eq hugo.Environment "production" }}
  {{ with .Site.Params.plausible_domain }}
  <script defer data-domain="{{ . }}" src="https://plausible.io/js/script.js"></script>
  {{ end }}
  {{ end }}
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  {{ partial "header.html" . }}
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
</body>
</html>
