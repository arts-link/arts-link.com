<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="canonical" href="{{ .Permalink }}">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300;1,9..144,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">

  <!-- Theme: early init to prevent flash of wrong theme -->
  <script>
    (function () {
      var t = localStorage.getItem('theme');
      if (t === 'light' || t === 'artistic') {
        document.documentElement.classList.add(t);
      } else if (t === 'dark') {
        document.documentElement.classList.add('dark');
      } else {
        // system: follow OS preference (dark is the default design)
        if (window.matchMedia('(prefers-color-scheme: light)').matches) {
          document.documentElement.classList.add('light');
        }
      }
    })();
  </script>

  <!-- Styles -->
  {{ $css := resources.Get "css/main.css" | postCSS | minify | fingerprint }}
  <link rel="stylesheet" href="{{ $css.RelPermalink }}" integrity="{{ $css.Data.Integrity }}">

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.7/dist/cdn.min.js"></script>

  <!-- Theme switcher -->
  <script>
    (function () {
      var themes = ['dark', 'light', 'artistic', 'system'];
      var icons = { dark: 'icon-dark', light: 'icon-light', artistic: 'icon-artistic', system: 'icon-system' };

      function getStored() {
        var t = localStorage.getItem('theme');
        if (!t) return 'system';
        return t;
      }

      function applyTheme(theme) {
        document.documentElement.classList.remove('dark', 'light', 'artistic');
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
          localStorage.setItem('theme', 'dark');
        } else if (theme === 'light') {
          document.documentElement.classList.add('light');
          localStorage.setItem('theme', 'light');
        } else if (theme === 'artistic') {
          document.documentElement.classList.add('artistic');
          localStorage.setItem('theme', 'artistic');
        } else {
          // system
          localStorage.removeItem('theme');
          if (window.matchMedia('(prefers-color-scheme: light)').matches) {
            document.documentElement.classList.add('light');
          }
        }
        updateIcon(theme);
      }

      function updateIcon(theme) {
        Object.values(icons).forEach(function (id) {
          var el = document.getElementById(id);
          if (el) el.classList.add('hidden');
        });
        var active = icons[theme];
        if (active) {
          var el = document.getElementById(active);
          if (el) el.classList.remove('hidden');
        }
      }

      function cycleTheme() {
        var current = getStored();
        var idx = themes.indexOf(current);
        var next = themes[(idx + 1) % themes.length];
        applyTheme(next);
      }

      document.addEventListener('DOMContentLoaded', function () {
        updateIcon(getStored());
        ['themeBtn', 'themeBtnMobile'].forEach(function (id) {
          var btn = document.getElementById(id);
          if (btn) btn.addEventListener('click', cycleTheme);
        });
      });
    })();
  </script>

  <!-- Analytics (production only) -->
  {{ if eq hugo.Environment "production" }}
  {{ with .Site.Params.plausible_domain }}
  <script defer data-domain="{{ . }}" src="https://plausible.io/js/script.js"></script>
  {{ end }}
  {{ end }}
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  {{ partial "header.html" . }}
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
</body>
</html>
